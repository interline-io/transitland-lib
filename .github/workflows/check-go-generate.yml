name: Check Generated Code

on:
  pull_request:
    branches: [main]
    # go generate ./... skips testdata/ directories and does not read test
    # files, so changes limited to those paths cannot affect generated code.
    paths-ignore:
      - 'testdata/**'
      - '**/*_test.go'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-generated:
    name: Check Generated Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.3'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run go generate
        run: go generate ./...

      - name: Fail if generated code is stale
        run: |
          # Stage all changes so modified, new, and deleted generated files count.
          git add -A
          # Ignore volatile lines that differ by environment but do not indicate
          # stale code: the spf13/cobra doc-gen footer timestamp and the base
          # protoc version. protoc-gen-go / protoc-gen-go-grpc versions are NOT
          # ignored and will still fail the check.
          git diff --cached \
            --ignore-matching-lines="Auto generated by spf13/cobra " \
            --ignore-matching-lines="protoc " \
            > changes.diff
          if [ -s changes.diff ]; then
            echo "::error::Generated code is out of date - run 'go generate ./...' and commit the result."
            cat changes.diff
            exit 1
          fi
