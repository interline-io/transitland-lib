name: Test Suite

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - '**.md'
  push:
    branches:
      - main

# Cancel superseded runs on PR branches; never cancel runs on main, since the
# release workflow requires a completed Test Suite run for the tagged commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest] # , macos-15
        go-version: ['1.26.3']
    runs-on: ${{ matrix.os }}
    env:
      TL_TEST_DATABASE_URL: postgres://root:for_testing@localhost:5432/tlv2_test?sslmode=disable
      TL_TEST_SERVER_DATABASE_URL: postgres://root:for_testing@localhost:5432/tlv2_test_server?sslmode=disable
      TL_REDIS_URL: redis://localhost
      TL_TEST_REDIS_URL: redis://localhost
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: for_testing
          POSTGRES_DB: tlv2_test_server
        options: >-
          --health-cmd "pg_isready -U root -d tlv2_test_server"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        id: go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install transitland CLI
        run: (cd cmd/transitland && go version && go install .)
      - name: Set up test database
        run: ./testdata/test_setup.sh
      - name: Run tests
        run: go test -coverprofile c.out ./...
      - name: Produce coverage report
        run: go tool cover -html=c.out -o coverage.html
      - name: Save coverage report as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.html
